# Quadrant: spirometry reference value calculator
# License: AGPL-3.0-or-later
#
# Run the testthat suite on every push to main and every pull request.
# Uses the lockfile in renv.lock to pin package versions; no Quarto CLI
# is required because the calculation, interpretation, and bundle
# assembly tests do not invoke quarto::quarto_render.

name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  testthat:
    runs-on: ubuntu-latest
    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libuv1-dev

      - name: Restore renv project library
        uses: r-lib/actions/setup-renv@v2

      - name: Run test suite
        working-directory: tests
        run: Rscript testthat.R
